<main class="auth-page">
  <section class="auth-card register-card">
    <header class="auth-header">
      <span class="brand-mark">PC</span>
      <p class="eyebrow">Registro de paciente</p>
      <h1>Crear cuenta</h1>
      <p>Completa tus datos para acceder al portal de citas.</p>
    </header>

    <form (ngSubmit)="guardar()" class="register-form">
      <label>
        Tipo de documento
        <select name="tipoDoc" [(ngModel)]="paciente.tipoDoc" required>
          <option value="">Selecciona</option>
          <option value="DNI">DNI</option>
          <option value="CE">CE</option>
        </select>
      </label>

      <label>
        Numero de documento
        <input type="text" name="numDoc" [(ngModel)]="paciente.numDoc" placeholder="Ej: 70000004" required />
      </label>

      <label>
        Nombre
        <input type="text" name="nombre" [(ngModel)]="paciente.nombre" placeholder="Nombre" required />
      </label>

      <label>
        Apellido
        <input type="text" name="apellido" [(ngModel)]="paciente.apellido" placeholder="Apellido" required />
      </label>

      <label>
        Sexo
        <select name="sexo" [(ngModel)]="paciente.sexo" required>
          <option value="">Selecciona</option>
          <option value="M">Masculino</option>
          <option value="F">Femenino</option>
        </select>
      </label>

      <label>
        Correo electronico
        <input type="email" name="correo" [(ngModel)]="paciente.correo" placeholder="tu@correo.com" required />
      </label>

      <label class="full">
        Direccion
        <input type="text" name="direccion" [(ngModel)]="paciente.direccion" placeholder="Direccion" required />
      </label>

      <label class="full">
        Clave
        <input type="password" name="clave" [(ngModel)]="paciente.clave" placeholder="Minimo 8 caracteres" required />
      </label>

      <button class="primary-button full" type="submit">Registrarme</button>
    </form>

    <div *ngIf="mensaje" class="alert success">{{ mensaje }}</div>
    <div *ngIf="error" class="alert error">{{ error }}</div>

    <footer class="auth-footer">
      <span>Ya tienes cuenta?</span>
      <a routerLink="/login">Ir al login</a>
    </footer>
  </section>
</main>
