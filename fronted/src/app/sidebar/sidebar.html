<div class="layout">

  <!-- Overlay para móviles -->
  <div
    *ngIf="isOpen"
    class="overlay"
    (click)="toggleSidebar()">
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isOpen">

    <!-- Encabezado -->
    <div class="sidebar-header">

      <div class="brand-logo">
        <img src="/logo2.png" alt="Logo Policlínico">
      </div>

      <div class="brand-info">
        <h2>Policlínico</h2>
        <p>Chorrillos Salud</p>
      </div>

    </div>

    <!-- Información del usuario -->
    <section class="user-card">

      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>

      <h3>{{ displayName() }}</h3>

      <span class="user-role">
        {{ userInfo?.rol || 'ROL' }}
      </span>

      <small>
        Código: {{ displayCode() }}
      </small>

    </section>

    <!-- Menú -->
    <nav class="menu" aria-label="Navegación principal">

      <button
        *ngFor="let item of menuItems"
        type="button"
        class="menu-item"
        (click)="handleMenuClick(item)">

        <i
          class="bi"
          [ngClass]="{

            'bi-house-door-fill':
              item.label === 'Inicio',

            'bi-calendar-plus-fill':
              item.label === 'Registrar cita',

            'bi-calendar-check-fill':
              item.label === 'Gestionar citas' ||
              item.label === 'Mis citas',

            'bi-envelope-paper-fill':
              item.label === 'Solicitar disponibilidad',

            'bi-hourglass-split':
              item.label === 'Citas pendientes',

            'bi-clock-history':
              item.label === 'Historial',

            'bi-heart-pulse-fill':
              item.label === 'Especialidades',

            'bi-person-badge-fill':
              item.label === 'Registrar medico' ||
              item.label === 'Médicos',

            'bi-person-workspace':
              item.label === 'Registrar jefe medico' ||
              item.label === 'Jefes médicos',

            'bi-calendar-week-fill':
              item.label === 'Horarios',

            'bi-clock-fill':
              item.label === 'Disponibilidades',

            'bi-file-earmark-medical-fill':
              item.label === 'Solicitudes'

          }">
        </i>

        <span>
          {{ item.label }}
        </span>

      </button>

    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">

      <button
        type="button"
        class="logout-button"
        (click)="handleLogout()">

        <i class="bi bi-box-arrow-right"></i>

        <span>Cerrar sesión</span>

      </button>

    </div>

  </aside>

  <!-- Contenido -->
  <section class="content-area">

    <header class="topbar">

      <button
        type="button"
        class="menu-toggle"
        (click)="toggleSidebar()">

        <i class="bi bi-list"></i>

      </button>

      <div class="topbar-info">

        <h2>
          {{ pageTitle }}
        </h2>

        <p>

          <i class="bi bi-person-circle"></i>

          {{ displayName() }}

          <span>|</span>

          {{ userInfo?.rol }}

        </p>

      </div>

    </header>

    <main class="page-content">

      <ng-content></ng-content>

    </main>

  </section>

</div>
