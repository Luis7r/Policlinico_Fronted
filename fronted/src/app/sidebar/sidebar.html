<div class="layout">
  <div *ngIf="isOpen" class="overlay" (click)="toggleSidebar()"></div>

  <aside class="sidebar" [class.open]="isOpen">
    <div class="brand">
      <span class="brand-mark">PC</span>
      <div>
        <strong>Policlinico</strong>
        <small>Sistema de citas</small>
      </div>
    </div>

    <section class="user-card">
      <span class="role">{{ userInfo?.rol || 'ROL' }}</span>
      <strong>{{ displayName() }}</strong>
      <small>Codigo: {{ displayCode() }}</small>
    </section>

    <nav class="menu" aria-label="Navegacion principal">
      <button
        *ngFor="let item of menuItems"
        type="button"
        class="menu-item"
        (click)="handleMenuClick(item)"
      >
        {{ item.label }}
      </button>
    </nav>

    <button type="button" class="logout-button" (click)="handleLogout()">Salir</button>
  </aside>

  <section class="content-area">
    <header class="topbar">
      <button type="button" class="menu-toggle" (click)="toggleSidebar()">Menu</button>
      <div>
        <h2>{{ pageTitle }}</h2>
        <p>{{ displayName() }} | {{ userInfo?.rol }}</p>
      </div>
    </header>

    <main class="page-content">
      <ng-content></ng-content>
    </main>
  </section>
</div>
