<div class="flex h-screen bg-gray-100">
      <!-- Overlay for mobile -->
      <div
        *ngIf="isOpen"
        class="fixed inset-0 bg-black bg-opacity-50 md:hidden z-40"
        (click)="toggleSidebar()"
      ></div>

      <!-- Sidebar -->
      <aside
        class="fixed md:relative w-64 h-screen bg-gradient-to-b from-slate-800 to-slate-900 text-white transform transition-transform duration-300 ease-in-out z-50 md:translate-x-0"
        [class.translate-x-0]="isOpen"
        [class.-translate-x-full]="!isOpen"
      >
        <!-- Logo -->
        <div class="p-6 border-b border-slate-700">
          <h1 class="text-2xl font-bold flex items-center gap-3">
            <span class="w-8 h-8 bg-slate-400 rounded-lg flex items-center justify-center text-sm font-semibold uppercase tracking-wide">PC</span>
            Policlinico
          </h1>
        </div>

        <!-- User Info -->
        <div class="p-6 border-b border-slate-700 bg-slate-800">
          <p class="text-sm text-slate-200">{{ userInfo?.rol }}</p>
          <p class="font-semibold text-white truncate">{{ userInfo?.nombreCompleto }}</p>
          <p class="text-xs text-slate-300">Código: {{ userInfo?.codigo }}</p>
        </div>

        <!-- Menu -->
        <nav class="p-4 space-y-2 flex-1 overflow-y-auto">
          <div *ngFor="let item of menuItems" class="mb-2">
            <button
              *ngIf="item.action"
              (click)="handleMenuClick(item)"
              class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 transition-colors duration-200 flex items-center gap-3"
            >
              <span>{{ item.label }}</span>
            </button>
            <a
              *ngIf="item.path"
              [routerLink]="item.path"
              class="block px-4 py-3 rounded-lg hover:bg-slate-700 transition-colors duration-200 flex items-center gap-3"
              (click)="closeOnMobile()"
            >
              <span>{{ item.label }}</span>
            </a>
          </div>
        </nav>

        <!-- Logout -->
        <div class="p-4 border-t border-slate-700">
          <button
            (click)="handleLogout()"
            class="w-full px-4 py-3 rounded-lg bg-red-500 hover:bg-red-600 transition-colors duration-200 font-semibold"
          >
            Salir
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col md:flex-1">
        <!-- Top Header -->
        <header class="bg-white shadow-sm border-b border-gray-200">
          <div class="flex items-center justify-between px-4 md:px-6 py-4">
            <!-- Mobile Menu Toggle -->
            <button
              (click)="toggleSidebar()"
              class="md:hidden rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition-colors"
            >
              Menú
            </button>

            <!-- Header Title -->
            <h2 class="text-xl md:text-2xl font-bold text-slate-900 flex-1 text-center md:text-left md:ml-0 ml-auto">
              {{ pageTitle }}
            </h2>

            <!-- Header Actions -->
            <div class="flex items-center gap-4">
              <div class="hidden md:block text-right">
                <p class="text-sm text-gray-600">{{ userInfo?.nombreCompleto }}</p>
                <p class="text-xs text-gray-400">{{ userInfo?.rol }}</p>
              </div>
            </div>
          </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-auto bg-gray-50 p-4 md:p-6">
          <ng-content></ng-content>
        </main>
      </div>
    </div>
