<main class="login-page">
  <section class="login-card">
      <div class="login-logo" aria-label="Logo de Chorrillos Salud">
        <img src="/logo.png" alt="Chorrillos Salud" />
      </div>

    <section class="login-form-panel">
      <header>
        <h2>Iniciar sesion</h2>
        <p>Ingresa con el correo registrado en el sistema.</p>
      </header>

      <form (ngSubmit)="ingresar()" class="login-form">
        <label>
          Correo electronico
          <input
            type="email"
            name="correo"
            [(ngModel)]="credenciales.correo"
            required
            placeholder="nombre@gmail.com"
          />
        </label>

        <label>
          Clave
          <input
            type="password"
            name="clave"
            [(ngModel)]="credenciales.clave"
            required
            placeholder="Contraseña"
          />
        </label>

        <button type="submit" class="primary-button" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div *ngIf="error" class="alert error">{{ error }}</div>

      <footer>
        <span>No tienes cuenta?</span>
        <a routerLink="/registro">Registrate como paciente</a>
      </footer>
    </section>
  </section>
</main>
