<main class="login-page">
  <section class="login-card">
    <aside class="login-brand">
      <span class="brand-mark">PC</span>
      <p class="eyebrow">Portal de citas</p>
      <h1>Policlinico</h1>
      <p>Gestiona tus citas medicas de forma ordenada y segura.</p>
    </aside>

    <section class="login-form-panel">
      <header>
        <h2>Iniciar sesion</h2>
        <p>Ingresa con el correo registrado en el sistema.</p>
      </header>

      <form (ngSubmit)="ingresar()" class="login-form">
        <label>
          Correo electronico
          <input
            type="email"
            name="correo"
            [(ngModel)]="credenciales.correo"
            required
            placeholder="tu@correo.com"
          />
        </label>

        <label>
          Clave
          <input
            type="password"
            name="clave"
            [(ngModel)]="credenciales.clave"
            required
            placeholder="Tu clave"
          />
        </label>

        <button type="submit" class="primary-button" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div *ngIf="error" class="alert error">{{ error }}</div>

      <footer>
        <span>No tienes cuenta?</span>
        <a routerLink="/registro">Registrate como paciente</a>
      </footer>
    </section>
  </section>
</main>
