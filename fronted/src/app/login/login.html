<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden font-sans selection:bg-teal-200 selection:text-teal-900">
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-72 bg-gradient-to-b from-teal-100/60 to-transparent blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-emerald-100/50 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute top-32 -left-32 w-72 h-72 bg-cyan-100/40 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-[420px] bg-white rounded-[2rem] shadow-[0_8px_40px_-12px_rgba(13,148,136,0.15)] border border-slate-100/80 overflow-hidden flex flex-col">

    <div class="px-8 pt-10 pb-8 text-center relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-br from-teal-50 to-emerald-50/30 opacity-50"></div>
      
      <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-teal-500 to-emerald-400 text-white shadow-lg shadow-teal-500/30 mb-5 -rotate-3 transition-transform hover:rotate-0 duration-300">
        <svg class="w-8 h-8 rotate-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </div>
      
      <h1 class="relative text-2xl font-bold text-slate-800 tracking-tight">Policlínico</h1>
      <p class="relative text-slate-500 text-sm mt-1.5 font-medium">Gestión segura de citas médicas</p>
    </div>

    <div class="px-8 pb-10">
      <form (ngSubmit)="ingresar()" class="space-y-5">

        <div class="space-y-1.5">
          <label class="block text-sm font-semibold text-slate-700">Correo electrónico</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-teal-500 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input
              type="email"
              name="correo"
              [(ngModel)]="credenciales.correo"
              required
              placeholder="tu@correo.com"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/50 pl-10 pr-4 py-3.5 text-sm text-slate-900 transition-all focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/10 placeholder:text-slate-400"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-semibold text-slate-700">Contraseña</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-teal-500 transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input
              type="password"
              name="clave"
              [(ngModel)]="credenciales.clave"
              required
              placeholder="••••••••"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/50 pl-10 pr-4 py-3.5 text-sm text-slate-900 transition-all focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-teal-500/10 placeholder:text-slate-400"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="cargando"
          class="relative w-full overflow-hidden rounded-xl bg-slate-900 px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-slate-900/20 transition-all hover:bg-slate-800 hover:shadow-slate-900/30 active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-70 mt-6"
        >
          <span *ngIf="!cargando">Ingresar</span>
          <span *ngIf="cargando" class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin text-teal-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Ingresando...
          </span>
        </button>
      </form>

      <div *ngIf="error" class="mt-5 flex items-start gap-3 rounded-xl bg-red-50 p-3.5 border border-red-100">
        <svg class="h-5 w-5 text-red-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="text-sm font-medium text-red-800">{{ error }}</p>
      </div>

      <div class="mt-8 flex items-center justify-center gap-2 text-sm border-t border-slate-100 pt-6">
        <span class="text-slate-500">¿No tienes cuenta?</span>
        <a routerLink="/registro" class="font-bold text-slate-900 hover:text-teal-600 transition-colors">Regístrate aquí</a>
      </div>

    </div>

    <div class="bg-slate-50 py-3.5 border-t border-slate-100 flex items-center justify-center gap-2 text-xs font-medium text-slate-500">
      <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
      Tus datos están protegidos
    </div>
  </div>
</div>
